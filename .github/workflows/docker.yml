name: Build Local Images

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Get latest mihomo version
        id: mihomo
        run: |
          VERSION=$(curl -s https://api.github.com/repos/MetaCubeX/mihomo/releases/latest \
            | grep '"tag_name":' \
            | sed -E 's/.*"v([^"]+)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build mihomo
        run: |
          cat > Dockerfile.mihomo << 'EOF'
          FROM golang:1.22-alpine AS builder
          WORKDIR /app
          RUN apk add --no-cache curl tar

          ARG MIHOMO_VERSION

          RUN curl -L https://github.com/MetaCubeX/mihomo/archive/refs/tags/v${MIHOMO_VERSION}.tar.gz \
              -o mihomo.tar.gz \
           && tar -xzf mihomo.tar.gz --strip-components=1

          RUN CGO_ENABLED=0 go build -ldflags "-s -w" -o mihomo

          FROM alpine:latest
          RUN apk add --no-cache ca-certificates
          COPY --from=builder /app/mihomo /usr/local/bin/mihomo
          CMD ["mihomo"]
          EOF

          docker build \
            --build-arg MIHOMO_VERSION=${{ steps.mihomo.outputs.version }} \
            -f Dockerfile.mihomo \
            -t mihomo:local .

      - name: Build metacubexd
        run: |
          docker pull ghcr.io/metacubex/metacubexd:latest
          docker tag ghcr.io/metacubex/metacubexd:latest metacubexd:local
          docker rmi ghcr.io/metacubex/metacubexd:latest

      - name: Save images
        run: |
          docker save mihomo:local -o mihomo.tar
          docker save metacubexd:local -o metacubexd.tar

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-images
          path: |
            mihomo.tar
            metacubexd.tar
