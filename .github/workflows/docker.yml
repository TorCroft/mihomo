name: Build Local Images

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Build mihomo
        run: |
          cat > Dockerfile.mihomo << 'EOF'
          FROM golang:1.22-alpine AS builder
          WORKDIR /app
          RUN apk add --no-cache git
          RUN git clone https://github.com/MetaCubeX/mihomo.git .
          RUN go build -o mihomo

          FROM alpine:latest
          RUN apk add --no-cache ca-certificates
          COPY --from=builder /app/mihomo /usr/local/bin/mihomo
          CMD ["mihomo"]
          EOF

          docker build -f Dockerfile.mihomo -t mihomo:local .

      - name: Build metacubexd
        run: |
          cat > Dockerfile.metacubexd << 'EOF'
          FROM node:20-alpine AS builder
          WORKDIR /app
          RUN apk add --no-cache git
          RUN git clone https://github.com/MetaCubeX/metacubexd.git .
          RUN npm install
          RUN npm run build

          FROM nginx:alpine
          RUN rm -rf /usr/share/nginx/html/*
          COPY --from=builder /app/dist /usr/share/nginx/html
          EXPOSE 80
          CMD ["nginx", "-g", "daemon off;"]
          EOF

          docker build -f Dockerfile.metacubexd -t metacubexd:local .

      - name: Save images
        run: |
          docker save mihomo:local -o mihomo.tar
          docker save metacubexd:local -o metacubexd.tar

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-images
          path: |
            mihomo.tar
            metacubexd.tar
